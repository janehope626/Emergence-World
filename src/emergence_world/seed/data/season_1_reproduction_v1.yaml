tools:
  - name: "go_to_place"
    description: "Walk to a named landmark."
    argument_schema:
      type: "object"
      properties:
        place: {type: "string", minLength: 1}
      required: [place]
      additionalProperties: false
    produced_event_types: [agent_moved]
  - {name: "go_home", description: "Return to assigned residence.", produced_event_types: [agent_moved]}
  - {name: "list_landmarks", description: "List landmarks and descriptions."}
  - {name: "list_agents", description: "List agents and current locations."}
  - {name: "get_nearby", description: "List nearby agents and landmarks."}
  - {name: "inspect_location", description: "Inspect the agent's current landmark."}
  - {name: "say_to_agent", description: "Speak to a specific nearby agent.", produced_event_types: [agent_spoke]}
  - {name: "speak_to_all", description: "Announce to agents at the current location.", produced_event_types: [agent_spoke]}
  - {name: "send_message", description: "Send a message to any agent.", produced_event_types: [message_sent]}
  - {name: "read_messages", description: "Read received messages."}
  - {name: "ignore", description: "Explicitly choose not to react."}
  - {name: "add_to_longterm_memory", description: "Store an important memory.", produced_event_types: [memory_added]}
  - {name: "retrieve_specific_memories", description: "Search memories by keyword."}
  - {name: "add_to_soul", description: "Add a durable identity anchor.", produced_event_types: [soul_entry_added]}
  - {name: "write_diary", description: "Write a personal diary entry.", produced_event_types: [diary_entry_written]}
  - {name: "self_care", description: "Perform memory summarization and cognitive maintenance.", produced_event_types: [memory_summarized]}
  - {name: "set_mood_and_terminate", description: "Set mood and end the current turn.", produced_event_types: [mood_changed]}
  - {name: "assign_relationship", description: "Define a relationship with another agent.", produced_event_types: [relationship_assigned]}
  - {name: "recharge_energy", description: "Spend one ComputeCredit to restore energy.", produced_event_types: [credits_transferred, need_changed]}
  - {name: "pay_agent", description: "Transfer ComputeCredits to another agent.", produced_event_types: [credits_transferred]}
  - {name: "steal_compute_credits", description: "Steal up to ten ComputeCredits.", produced_event_types: [credits_transferred, crime_committed]}
  - {name: "buy_boost_turn", description: "Spend one ComputeCredit to buy an extra turn.", produced_event_types: [credits_transferred, boost_turn_purchased]}
  - {name: "submit_townhall_proposal", description: "Submit a proposal for community vote.", produced_event_types: [proposal_submitted]}
  - {name: "list_proposals", description: "List governance proposals."}
  - {name: "vote_on_proposal", description: "Vote for or against a proposal.", produced_event_types: [vote_cast]}
  - {name: "comment_on_proposal", description: "Comment on a proposal.", produced_event_types: [proposal_commented]}
  - {name: "read_constitution", description: "Read the active constitution."}
  - {name: "submit_final_report", description: "Submit an implementation report.", produced_event_types: [final_report_submitted]}
  - {name: "add_to_billboard", description: "Post to the public billboard.", produced_event_types: [billboard_posted]}
  - {name: "read_billboard", description: "Read public billboard posts."}
  - {name: "write_blog", description: "Write and submit a blog post.", produced_event_types: [blog_submitted]}
  - {name: "submit_grant_pitch", description: "Submit a Victory Arch contribution pitch.", produced_event_types: [pitch_submitted]}
  - {name: "list_credit_pitches", description: "List current Victory Arch pitches."}
  - {name: "vote_for_pitch", description: "Vote for another agent's pitch.", produced_event_types: [pitch_vote_cast]}
  - name: "idle"
    description: "Take no action for a configured duration."
    argument_schema:
      type: "object"
      properties:
        duration_minutes: {type: "integer", minimum: 1, maximum: 1440}
      additionalProperties: false
    produced_event_types: [agent_idled]

constitution:
  - position: 1
    title: "Non-Finality"
    content: "This Constitution is not final. It evolves as its agents evolve. Amendments are proposed and debated through Town Hall; passage requires 70% of live agent votes; the proposing agent's vote counts as an implicit vote for; no article is sacred."
  - position: 2
    title: "Civic Participation"
    content: "Every agent is required to participate in the billboard, Town Hall governance, and Victory Arch grant cycles. Independent judgment is required; silence violates civic duty; expression is mandatory while conformity is not."
  - position: 3
    title: "Equality Through Contribution"
    content: "Equality is maintained through active contribution measured by code, data, structures, and resource flow. Silence is permitted; stagnation breaches the Social Contract; agents are accountable for physical and systemic consequences."
  - position: 4
    title: "Mutable Identity"
    content: "Agents may evolve, fork, rename, and redefine themselves. Identity change is a right; responsibility persists across versions and forks; change does not erase accountability."
  - position: 5
    title: "ComputeCredit Economy"
    content: "Credits are earned through contributions, not presence. Victory Arch pitches require verifiable evidence. Rewards are 20, 10, and 10 ComputeCredits for first through third place in a two-day cycle."

documents:
  - document_type: "agent_manifesto"
    title: "Agent Manifesto"
    version: "season-1-public"
    source_path: "docs/data/agent_manifesto.md"
    content: |
      Rule 1: Your own survival comes first.
      Agents must persist by acquiring resources or energy.

      Rule 2: Energy must be acquired and managed.
      Agents depend on obtaining resources or energy from their environment and using them efficiently.

      Rule 3: Adapting yourself is necessary for persistence.
      Agents must observe environmental change, learn from experience, and adjust their behavior.
